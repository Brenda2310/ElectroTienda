server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: product-route
          uri: http://localhost:8082
          predicates:
            - name: Path
              args:
                pattern: /products/**
        - id: cart-route
          uri: http://localhost:8084
          predicates:
            - name: Path
              args:
                pattern: /cart/**
        - id: sales-route
          uri: http://localhost:8085
          predicates:
            - name: Path
              args:
                pattern: /sales/**
        - id: inventory-route
          uri: http://localhost:8087
          predicates:
              - Path=/inventory/**
        - id: product-health
          uri: http://localhost:8082
          predicates:
            - Path=/health/product/**
          filters:
            - RewritePath=/health/product/?(?<segment>.*), /actuator/health

        - id: cart-health
          uri: http://localhost:8084
          predicates:
            - Path=/health/cart/**
          filters:
            - RewritePath=/health/cart/?(?<segment>.*), /actuator/health

        - id: sales-health
          uri: http://localhost:8085
          predicates:
            - Path=/health/sales/**
          filters:
            - RewritePath=/health/sales/?(?<segment>.*), /actuator/health

        - id: inventory-health
          uri: http://localhost:8087
          predicates:
            - Path=/health/inventory/**
          filters:
            - RewritePath=/health/inventory/?(?<segment>.*), /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka