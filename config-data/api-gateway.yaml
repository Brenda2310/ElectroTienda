server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: cart-route
          uri: lb://cart-service
          predicates:
            - Path=/cart/**
          filters:
            - StripPrefix=1

        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/products/**
          filters:
            - StripPrefix=1

        - id: sales-route
          uri: lb://sales-service
          predicates:
            - Path=/sales/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka