server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: cart-route
          uri: lb://CART-SERVICE
          predicates:
            - Path=/cart,/cart/**

        - id: product-route
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products,/products/**

        - id: sales-route
          uri: lb://SALES-SERVICE
          predicates:
            - Path=/sales,/sales/**

management:
  endpoints:
    web:
      exposure:
        include: gateway