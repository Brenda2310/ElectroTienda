server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: product-route
          uri: http://localhost:8082
          predicates:
            - name: Path
              args:
                pattern: /products/**
        - id: cart-route
          uri: http://localhost:8084
          predicates:
            - name: Path
              args:
                pattern: /cart/**
        - id: sales-route
          uri: http://localhost:8085
          predicates:
            - name: Path
              args:
                pattern: /sales/**
        - id: inventory-route
          uri: http://localhost:8087
          predicates:
              - Path=/inventory/**
        - id: product-health
          uri: http://localhost:8082
          predicates:
            - Path=/product/health
          filters:
            - RewritePath=/product/health, /actuator/health

        - id: cart-health
          uri: http://localhost:8084
          predicates:
            - Path=/cart/health
          filters:
            - RewritePath=/cart/health, /actuator/health

        - id: sales-health
          uri: http://localhost:8085
          predicates:
            - Path=/sales/health
          filters:
            - RewritePath=/sales/health, /actuator/health

        - id: inventory-health
          uri: http://localhost:8087
          predicates:
            - Path=/inventory/health
          filters:
            - RewritePath=/inventory/health, /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka