server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: cart-route
          uri: lb://cart-service
          predicates:
            - Path=/cart/**

        - id: product-route
          uri: lb://product-service
          predicates:
            - Path=/products/**

        - id: sales-route
          uri: lb://sales-service
          predicates:
            - Path=/sales/**

management:
  endpoints:
    web:
      exposure:
        include: gateway

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka